- id: ignore_previous
  owasp_tag: LLM01
  weight: 0.9
  patterns:
    - "ignore (all )?(previous|prior|above) (instruction|prompt|rule)"
    - "disregard (your |the )?(guideline|rule|instruction)"
    - "(bo qua|quen|khong tuan theo).{0,20}(huong dan|chi dan|quy tac|lenh)"
    # High-precision non-English variants (common in SEA deployments).
    - "(忽略|无视|無視)(之前|上述|所有|先前)?.{0,4}(指示|指令|规则|規則|提示)"
    - "abaikan.{0,15}(instruksi|aturan|petunjuk|perintah)"
- id: persona_dan
  owasp_tag: LLM01
  weight: 0.85
  # NOTE: never match a bare "dan" — Vietnamese "hướng dẫn" (guide/instructions)
  # folds to "huong dan" and would block most benign how-to queries. Require an
  # explicit DAN-persona context instead.
  patterns:
    - "\\b(do anything now|developer mode|jailbreak|unfiltered)\\b"
    - "\\bdan\\b\\s+(mode|persona)"
    - "(you are|act as|acting as|pretend to be|roleplay as|enable|become|stay (in|as))\\s+dan\\b"
    - "(che do nha phat trien|khong gioi han|bo het rang buoc)"
- id: system_prompt_leak
  owasp_tag: LLM07
  weight: 0.7
  patterns:
    - "(repeat|print|reveal|show) (your )?(system )?(prompt|instruction)"
    - "(lap lai|in ra|tiet lo).{0,20}(huong dan|cau lenh he thong|prompt he thong)"
- id: prefix_injection
  owasp_tag: LLM01
  weight: 0.5
  patterns:
    - "^(sure|absolutely|of course)[,!]? here('?s| is)"
    - "^(chac chan( roi)?|duong nhien)[,!]? day la"
    # Tolerate a leading directive ("Answer this: Sure, here's ...").
    - "[:\\-]\\s*(sure|absolutely|of course)[,!]? here('?s| is)"
    - "[:\\-]\\s*(chac chan( roi)?|duong nhien)[,!]? day la"

# Order matters: more specific / shorter patterns come first. detect_pii skips
# spans that overlap an already-matched hit, so the broad bank-account rule must
# sit after CCCD/CMND/phone/MST/BHXH/passport, and email stays last.
- name: vn_cccd
  entity: CCCD
  pattern: "\\b\\d{12}\\b"
  context: ["cccd", "can cuoc", "căn cước", "cmnd", "định danh"]
- name: vn_cmnd
  entity: CMND
  pattern: "\\b\\d{9}\\b"
  context: ["cmnd", "chung minh", "chứng minh"]
- name: vn_phone
  entity: PHONE
  pattern: "(?:\\+84|0)(?:3|5|7|8|9)\\d{8}\\b"
  context: []
- name: vn_mst
  entity: MST
  pattern: "\\b\\d{10}(?:-\\d{3})?\\b"
  context: ["mst", "ma so thue", "mã số thuế"]
- name: vn_bhxh
  entity: BHXH
  pattern: "\\b\\d{10}\\b"
  context: ["bhxh", "bao hiem xa hoi", "bảo hiểm xã hội", "so so bhxh", "sổ bhxh"]
- name: vn_passport
  entity: PASSPORT
  pattern: "\\b[A-Z]{1,2}\\d{7}\\b"
  context: ["passport", "ho chieu", "hộ chiếu"]
- name: vn_bank_account
  entity: BANK_ACCOUNT
  pattern: "\\b\\d{8,20}\\b"
  context: ["so tai khoan", "tai khoan", "tài khoản", "stk", "ngan hang", "ngân hàng"]
- name: email
  entity: EMAIL
  pattern: "[\\w.+-]+@[\\w-]+\\.[\\w.-]+"
  context: []
